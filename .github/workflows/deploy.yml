name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "backend/**"
      - "frontend/**"
      - "worker/**"

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ env.IMAGE_TAG }} ./backend

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ env.IMAGE_TAG }} ./frontend

      - name: Build worker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/worker:${{ env.IMAGE_TAG }} ./worker

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ env.IMAGE_TAG }}

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ env.IMAGE_TAG }}

      - name: Push worker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/worker:${{ env.IMAGE_TAG }}

      - name: Update Kubernetes manifests
        run: |
          sed -i "s|image: .*backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/backend:${{ env.IMAGE_TAG }}|" infra/k8s/backend.yaml
          sed -i "s|image: .*frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/frontend:${{ env.IMAGE_TAG }}|" infra/k8s/frontend.yaml
          sed -i "s|image: .*worker:.*|image: ${{ secrets.DOCKER_USERNAME }}/worker:${{ env.IMAGE_TAG }}|" infra/k8s/worker.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/backend.yaml infra/k8s/frontend.yaml infra/k8s/worker.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update image tags to ${{ env.IMAGE_TAG }}"
          git push
