services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env.docker
    depends_on:
      - mongo
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    build: ./worker
    env_file:
      - ./worker/.env.docker
    depends_on:
      - redis
      - mongo

  redis:
    image: redis:7-alpine

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
