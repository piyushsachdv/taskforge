apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: taskforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: piyushsachdv/worker:3b0714768fa5ecb94f32853312e91149920f0535
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - import sys; sys.exit(0)
            initialDelaySeconds: 10
            periodSeconds: 10
