apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskforge
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/piyushsachdv/taskforge
    targetRevision: HEAD
    path: infra/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: taskforge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
